server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/products/**

        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/api/carts/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka