server:
  port: 8082

spring:
  application:
    name: cart-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/microcommerce
          jwk-set-uri: http://localhost:8089/realms/microcommerce/protocol/openid-connect/certs

  datasource:
    url: jdbc:postgresql://localhost:5432/cart_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
